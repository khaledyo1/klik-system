<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Klik - الإدارة المالية</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
</head>
<body class="overflow-hidden h-screen flex">

<div id="loginScreen" class="fixed inset-0 z-[100] bg-slate-900 flex items-center justify-center p-6">
    <div class="bg-white p-8 rounded-3xl w-full max-w-sm text-center text-slate-900 shadow-2xl">
        <h1 class="text-3xl font-black mb-1">Klik <span class="text-sky-500">Stort</span></h1>
        <p class="text-xs text-slate-500 mb-8 font-bold">نظام إدارة متجر كليك</p>
        <form id="loginForm" class="space-y-4">
            <input type="email" id="loginEmail" required placeholder="البريد الإلكتروني" class="w-full p-4 bg-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-sky-500">
            <input type="password" id="loginPassword" required placeholder="كلمة المرور" class="w-full p-4 bg-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-sky-500">
            <button type="submit" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black tracking-wide">تسجيل الدخول</button>
        </form>
    </div>
</div>

<div id="mainApp" class="flex w-full h-full hidden">
    <aside id="mainSidebar" class="w-68 bg-slate-950 flex flex-col border-l border-white/5 transition-all">
        <div class="p-8 text-center border-b border-white/5 relative">
            <img src="klik_logonew.jpg" class="w-24 h-24 mx-auto rounded-full mb-4 border-2 border-sky-500 object-cover shadow-2xl">
            <h1 class="text-2xl font-black text-white">Klik <span class="text-sky-500">Stort</span></h1>
            <p class="text-[9px] text-sky-400 font-black uppercase tracking-tighter mt-1">الإدارة المالية</p>
        </div>
        <nav class="flex-grow py-6 overflow-y-auto">
            <a onclick="showSection('dashboard')" class="sidebar-link active">📊 اللوحة الرئيسية</a>
            <a onclick="showSection('sales')" class="sidebar-link">📁 سجل العمليات</a>
            <div id="adminNav" class="hidden border-t border-white/5 mt-4 pt-4">
                <a onclick="showSection('userMgmt')" class="sidebar-link text-red-400/80">👥 الإدارة</a>
            </div>
        </nav>
        <div class="p-6 border-t border-white/5 text-center">
            <div class="text-[10px] text-slate-500 mb-3">المسؤول: <span id="currentUserName" class="text-sky-500 font-bold"></span></div>
            <button onclick="auth.signOut()" class="w-full bg-red-500/10 text-red-500 py-3 rounded-xl text-xs font-bold hover:bg-red-500/20 transition-all">تسجيل خروج</button>
        </div>
    </aside>

    <main class="flex-grow flex flex-col bg-slate-900 overflow-hidden">
        <header class="bg-slate-950/50 backdrop-blur-md border-b border-white/5 p-4 flex justify-between items-center sticky top-0">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="bg-white/5 p-3 rounded-2xl text-white">☰</button>
                <h2 id="sectionTitle" class="text-sm font-bold tracking-tight">اللوحة المعلوماتية</h2>
            </div>
            <button onclick="document.documentElement.classList.toggle('dark')" class="text-xl">🌙</button>
        </header>

        <div class="flex-grow overflow-y-auto p-4 md:p-8">
            <div id="dashboard" class="space-content">
                <div class="grid grid-cols-2 gap-4 mb-8">
                    <div class="bg-white/5 p-5 rounded-3xl border border-white/5">
                        <div class="text-[10px] text-slate-500 font-bold uppercase mb-2">الإيراد الكلي</div>
                        <div id="statTotalRev" class="text-2xl font-black text-sky-500">0 ₪</div>
                    </div>
                    <div class="bg-white/5 p-5 rounded-3xl border border-white/5 border-r-green-500/50 border-r-4">
                        <div class="text-[10px] text-slate-500 font-bold uppercase mb-2">صافي الربح</div>
                        <div id="statProfit" class="text-2xl font-black text-green-500">0 ₪</div>
                    </div>
                </div>
            </div>
            <div id="sales" class="space-content hidden">
                <div class="bg-white/5 rounded-3xl border border-white/5 overflow-hidden">
                    <table class="w-full text-right"><tbody id="salesTableBody"></tbody></table>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="app.js"></script>
</body>
</html>
