<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Klik - الإدارة المالية</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
</head>
<body class="flex h-screen overflow-hidden">

<div id="loginScreen" class="fixed inset-0 z-[100] bg-slate-900 flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-3xl w-full max-w-sm text-center text-slate-900 shadow-2xl">
        <h1 class="text-3xl font-black mb-1">Klik <span class="text-sky-500">Store</span></h1>
        <p class="text-xs text-slate-500 mb-8 font-bold">نظام إدارة متجر كليك</p>
        <form id="loginForm" class="space-y-4 text-right">
            <input type="email" id="loginEmail" required placeholder="البريد الإلكتروني" class="w-full p-4 bg-slate-100 rounded-2xl outline-none">
            <input type="password" id="loginPassword" required placeholder="كلمة المرور" class="w-full p-4 bg-slate-100 rounded-2xl outline-none">
            <button type="submit" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black">تسجيل الدخول</button>
        </form>
    </div>
</div>

<div id="mainApp" class="flex w-full h-full hidden">
    <aside id="mainSidebar" class="w-64 bg-slate-950 flex flex-col border-l border-white/5 shadow-2xl">
        <div class="p-8 text-center border-b border-white/5">
            <img src="klik_logonew.jpg" class="w-20 h-20 mx-auto rounded-full mb-3 border-2 border-sky-500 object-cover">
            <h1 class="text-xl font-black text-white">Klik <span class="text-sky-500">Store</span></h1>
        </div>
        <nav class="flex-grow py-4">
            <a onclick="showSection('dashboard')" class="sidebar-link active">📊 اللوحة المعلوماتية</a>
            <a onclick="showSection('sales')" class="sidebar-link">📁 السجل والأرشفة</a>
            <a onclick="showSection('analytics')" class="sidebar-link">📈 التحليل المالي</a>
            <a onclick="showSection('alerts')" class="sidebar-link">🔔 التنبيهات</a>
            <div id="adminNav" class="hidden border-t border-white/5 mt-4 pt-4">
                <a onclick="showSection('userMgmt')" class="sidebar-link text-red-400/80">👥 إدارة الصلاحيات</a>
            </div>
        </nav>
        <div class="p-4 border-t border-white/5 text-center text-[10px]">
            مرحباً: <span id="currentUserName" class="text-sky-500"></span><br>
            <button onclick="auth.signOut()" class="mt-2 text-red-500 font-bold">تسجيل خروج</button>
        </div>
    </aside>

    <main class="flex-grow flex flex-col bg-slate-900">
        <header class="bg-slate-950/50 backdrop-blur-md border-b border-white/5 p-4 flex justify-between items-center">
            <button onclick="toggleSidebar()" class="bg-white/5 p-2 rounded-xl text-white">☰</button>
            <h2 id="sectionTitle" class="text-sm font-bold">النظام المالي</h2>
            <button onclick="openModalForAdd()" class="bg-sky-600 text-white px-4 py-2 rounded-xl font-bold text-xs shadow-lg">+ إضافة</button>
        </header>

        <div class="flex-grow overflow-y-auto p-4 md:p-8">
            <div id="dashboard" class="space-content">
                <div class="grid grid-cols-2 gap-4 mb-8">
                    <div class="bg-white/5 p-6 rounded-3xl border border-white/5 border-r-4 border-r-sky-500">
                        <div class="text-[10px] text-slate-500 font-bold mb-1">الإيرادات</div>
                        <div id="statTotalRev" class="text-2xl font-black">0 ₪</div>
                    </div>
                    <div class="bg-white/5 p-6 rounded-3xl border border-white/5 border-r-4 border-r-green-500">
                        <div class="text-[10px] text-slate-500 font-bold mb-1">الصافي</div>
                        <div id="statProfit" class="text-2xl font-black text-green-500">0 ₪</div>
                    </div>
                </div>
            </div>

            <div id="sales" class="space-content hidden">
                <div class="bg-white/5 rounded-3xl border border-white/5 overflow-hidden">
                    <table class="w-full text-right text-sm">
                        <thead class="bg-black/20 text-slate-400"><tr><th class="p-4">البيانات</th><th class="p-4 text-center">الربح</th><th class="p-4"></th></tr></thead>
                        <tbody id="salesTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>

<div id="addSaleModal" class="fixed inset-0 z-[110] hidden flex items-center justify-center p-4 backdrop-blur-md bg-black/40">
    <div class="bg-white text-slate-900 w-full max-w-md rounded-3xl p-8 shadow-2xl relative">
        <h3 class="text-xl font-black mb-6">تسجيل مبيعة جديدة</h3>
        <form id="saleForm" class="space-y-4">
            <input type="text" id="inService" required placeholder="اسم الخدمة" class="w-full p-4 bg-slate-100 rounded-2xl outline-none">
            <div class="flex gap-2">
                <input type="text" id="inClientName" required placeholder="الزبون" class="w-1/2 p-4 bg-slate-100 rounded-2xl outline-none">
                <input type="tel" id="inClientPhone" required placeholder="الهاتف" class="w-1/2 p-4 bg-slate-100 rounded-2xl outline-none">
            </div>
            <div class="flex gap-2 text-xs">
                <input type="date" id="inStart" required class="w-1/2 p-4 bg-slate-100 rounded-2xl outline-none">
                <input type="date" id="inEnd" required class="w-1/2 p-4 bg-slate-100 rounded-2xl outline-none">
            </div>
            <div class="flex gap-2">
                <input type="number" id="inCostUSD" required step="0.01" placeholder="التكلفة $" class="w-2/3 p-4 bg-slate-100 rounded-2xl outline-none">
                <input type="number" id="inExchange" required step="0.01" value="3.70" class="w-1/3 p-4 bg-slate-100 rounded-2xl outline-none text-center">
            </div>
            <input type="number" id="inPrice" required placeholder="المقبوض ₪" class="w-full p-4 border-2 border-sky-400 rounded-2xl text-2xl font-black text-center text-sky-600">
            <button type="submit" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black">حفظ المبيعة 🚀</button>
            <button type="button" onclick="document.getElementById('addSaleModal').classList.add('hidden')" class="w-full text-slate-400 text-xs mt-2">إلغاء</button>
        </form>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
